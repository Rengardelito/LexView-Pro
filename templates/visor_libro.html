<!DOCTYPE html>

    <script src="https://rawcdn.githack.com/blasten/turn.js/master/lib/turn.min.js"></script>
    <style>

        /* NUEVO: Sidebar con lista de archivos */

            top: 50px;

            text-overflow: ellipsis;
            display: block;

            padding: 150px; 
            box-sizing: border-box;

        #footer { 
            width: 100%; 
            height: 40px; 
            background: #1a1a1a;

            align-items: center;

            border-top: 1px solid #333;

            bottom: 0;

            width: calc(100% - 320px);

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<body>
    <div class="toolbar">
        <div>

    <div id="sidebar">

            <div class="archivo-item" data-archivo="{{ item.archivo }}">
                <span class="archivo-fecha">{{ item.fecha }}</span>
                <span class="archivo-nombre" title="{{ item.archivo }}">{{ item.archivo }}</span>
            </div>

        <div id="loading-text">Procesando expediente...</div>
    </div>

    <div id="viewport">
        <div id="album-container">
            <div id="album-wrapper">
                <div id="album"></div>
            </div>
        </div>
    </div>

    <div id="footer">
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];

        let totalPages = 0;
        let bookWidth = 0;
        let bookHeight = 0;
        const urlBase = "{{ url_for('obtener_pdf', nombre_pdf=archivo_pdf) }}";
        const urlFinal = urlBase + "?t=" + new Date().getTime();

            const availableWidth = window.innerWidth - 620; // 320 sidebar + 300 margen
            const availableHeight = window.innerHeight - 200;
            
            const ratio = 1.414;
            
            let width = availableWidth * 0.98;
            let height = width / ratio;
            
            if (height > availableHeight) {
                height = availableHeight * 0.98;
                width = height * ratio;
            }
            
            width = Math.max(width, 1800);
            height = width / ratio;
            
            return { width: Math.floor(width), height: Math.floor(height) };
        }

        function cambiarZoom(delta) {
            zoomActual = Math.min(Math.max(0.4, zoomActual + delta), 4.0);
            document.getElementById('album-container').style.transform = `scale(${zoomActual})`;
            document.getElementById('zoom-level').innerText = Math.round(zoomActual * 100) + "%";
            centerBook();
        }

        function centerBook() {
            const v = document.getElementById('viewport');
            const container = document.getElementById('album-container');
            v.scrollLeft = (container.offsetWidth * zoomActual - v.clientWidth) / 2;
            v.scrollTop = (container.offsetHeight * zoomActual - v.clientHeight) / 2;
        }

        async function initFlipbook() {
            try {
                $('#loading').css('display', 'flex');
                const loadingTask = pdfjsLib.getDocument(urlFinal);
                const pdf = await loadingTask.promise;
                totalPages = pdf.numPages;
                
                const bookSize = getBookSize();
                bookWidth = bookSize.width;
                bookHeight = bookSize.height;
                
                $('#album-wrapper').css({ width: bookWidth + 'px', height: bookHeight + 'px' });
                
                const newAlbum = $('#album');
                const pageWidth = bookWidth / 2;
                const pageHeight = bookHeight;

                newAlbum.append(`<div class="hard" style="width:${pageWidth}px;height:${pageHeight}px"></div>`);

                for (let i = 1; i <= totalPages; i++) {
                    document.getElementById('loading-text').innerText = `Renderizando foja ${i} de ${totalPages}...`;
                    const page = await pdf.getPage(i);
                    
                    const unscaledViewport = page.getViewport({ scale: 1.0 });
                    const scale = Math.min(pageWidth / unscaledViewport.width, pageHeight / unscaledViewport.height) * 0.96;
                    const viewport = page.getViewport({ scale: scale });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    await page.render({canvasContext: context, viewport: viewport}).promise;
                    
                    const pageDiv = $('<div class="page"/>').css({
                        width: pageWidth + 'px',
                        height: pageHeight + 'px',
                        display: 'flex',
                        'justify-content': 'center',
                        'align-items': 'center',
                        overflow: 'hidden'
                    }).append(canvas);
                    
                    newAlbum.append(pageDiv);
                }

                if (totalPages % 2 === 0) {
                    newAlbum.append(`<div class="hard" style="width:${pageWidth}px;height:${pageHeight}px"></div>`);
                }

                $('#loading').hide();

                newAlbum.turn({
                    width: bookWidth, height: bookHeight, autoCenter: true, gradients: true, shadows: true,
                    display: 'double',
                    when: { turned: function(e, page) {
                        const porcentaje = (page / (totalPages + 1)) * 100;
                        document.getElementById('progress-bar').style.width = porcentaje + "%";
                        document.getElementById('page-counter').innerText = `Foja: ${page} / ${totalPages}`;
                    }}
                });

                setTimeout(centerBook, 150);

                $('#zoom-in').click(() => cambiarZoom(0.25));
                $('#zoom-out').click(() => cambiarZoom(-0.25));
                $('#zoom-reset').click(() => { zoomActual = 1; cambiarZoom(0); });

                // Click en sidebar - por ahora solo resalta, después podemos mapear a páginas
                $('.archivo-item').click(function() {
                    $('.archivo-item').css('background', '#222');
                    $(this).css('background', '#00ff8833');
                });

                let isDown = false, startX, startY, scrollLeft, scrollTop;
                const v = document.getElementById('viewport');

                    if (e.target.closest('#album')) return;
                    isDown = true; 
                    startX = e.pageX - v.offsetLeft; 
                    startY = e.pageY - v.offsetTop; 
                    scrollLeft = v.scrollLeft;

                        cambiarZoom(e.deltaY > 0 ? -0.2 : 0.2); 
                    } 
                }, { passive: false });

                    if (e.keyCode == 37) $('#album').turn('previous'); 
                    if (e.keyCode == 39) $('#album').turn('next'); 
                });

                let resizeTimeout;
                $(window).on('resize', function() {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(function() {
                        location.reload();
                    }, 500);
                });

            } catch (error) { 
                alert("Error al cargar PDF: " + error.message); 
                $('#loading').hide();
            }
        }

        $(document).ready(function() {
            initFlipbook();
        });
    </script>
</body>
