<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Visor Móvil - {{ expte }}</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; overflow: hidden; }
        nav { 
            background: #111; color: #007bff; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #007bff; font-family: sans-serif;
        }
        .btn-volver { color: white; text-decoration: none; font-size: 0.9rem; font-weight: bold; }
        /* El contenedor del PDF ocupa el resto de la pantalla */
        .pdf-container { width: 100%; height: calc(100vh - 55px); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav>
        <span>📄 {{ expte }}</span>
        <a href="/" class="btn-volver">✕ CERRAR</a>
    </nav>

    <div class="pdf-container">
        <iframe src="{{ url_for('obtener_pdf', nombre_pdf=archivo_pdf) }}#toolbar=0"></iframe>
    </div>
</body>
</html>
